<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense & Budget Visualizer</title>

  <link rel="stylesheet" href="css/style.css" />

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

  <div class="container">

    <!-- HEADER -->
    <header class="header">
      <h1>Expense Tracker</h1>

      <div class="balance-card">
        <p>Total Pengeluaran</p>
        <h2 id="totalBalance">Rp 0</h2>
      </div>

      <!-- OPTIONAL FEATURE: DARK MODE -->
      <button id="themeToggle" class="theme-btn">
        🌙 Dark Mode
      </button>
    </header>

    <!-- FORM -->
    <section class="form-section">

      <form id="expenseForm">

        <div class="form-group">
          <label>Nama Item</label>
          <input
            type="text"
            id="itemName"
            placeholder="Contoh: Ayam Geprek"
          />
        </div>

        <div class="form-group">
          <label>Jumlah</label>
          <input
            type="number"
            id="itemAmount"
            placeholder="50000"
          />
        </div>

        <div class="form-group">
          <label>Kategori</label>

          <select id="itemCategory">
            <option value="">Pilih Kategori</option>
            <option value="Food">Food</option>
            <option value="Transport">Transport</option>
            <option value="Fun">Fun</option>
          </select>
        </div>

        <!-- OPTIONAL FEATURE: CUSTOM CATEGORY -->
        <div class="form-group">
          <label>Tambah Kategori Baru</label>

          <div class="custom-category-wrapper">
            <input
              type="text"
              id="customCategory"
              placeholder="Contoh: Shopping"
            />

            <button type="button" id="addCategoryBtn">
              Tambah
            </button>
          </div>
        </div>

        <button type="submit" class="submit-btn">
          Tambah Pengeluaran
        </button>

      </form>
    </section>

    <!-- OPTIONAL FEATURE: SORT -->
    <section class="sort-section">
      <select id="sortOption">
        <option value="latest">Urutkan: Terbaru</option>
        <option value="amount">Jumlah Terbesar</option>
        <option value="category">Kategori</option>
      </select>
    </section>

    <!-- TRANSACTION LIST -->
    <section class="list-section">

      <div class="section-title">
        <h3>Riwayat Transaksi</h3>
      </div>

      <div id="transactionList" class="transaction-list"></div>

    </section>

    <!-- CHART -->
    <section class="chart-section">

      <div class="section-title">
        <h3>Distribusi Pengeluaran</h3>
      </div>

      <canvas id="expenseChart"></canvas>

    </section>

  </div>

  <!-- TOAST -->
  <div id="toast" class="toast"></div>

  <script src="js/app.js"></script>

</body>
</html>
